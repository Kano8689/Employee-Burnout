{% extends "base.html" %}
{% block content %}
<div class="dashboard">
    <h1>Model Analytics Dashboard</h1>
    <p>This AI model predicts employee burnout on a scale from <strong>0.0 (No Burnout)</strong> to <strong>1.0 (Severe Burnout)</strong>.</p>
    
    <div class="card">
        <h3>Global Factor Impact on Predictions</h3>
        <canvas id="impactChart"></canvas>
    </div>
</div>

<script>
    // Pass python dictionary to JS
    const impactData = {{ impact | tojson }};
    renderImpactChart(impactData);
</script>
{% endblock %}
